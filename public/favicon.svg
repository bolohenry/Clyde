  <path d="M16 64 Q10 75 10 87" stroke="#1a2744" stroke-width="11" fill="none" stroke-linecap="round"/>
  <ellipse cx="10" cy="91" rx="5" ry="4" fill="#f5c4a1" transform="rotate(10 10 91)"/>
