  <path d="M30 23 Q37 20 43 22" stroke="#7a5230" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M53 22 Q60 20 67 23" stroke="#7a5230" stroke-width="2" fill="none" stroke-linecap="round"/>
