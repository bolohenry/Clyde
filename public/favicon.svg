  <!-- Neck -->
  <rect x="39" y="50" width="10" height="7" rx="2" fill="#e8ad8a"/>
  <!-- Head -->
  <ellipse cx="48" cy="31" rx="24" ry="26" fill="#f5c4a1"/>
  <!-- Cheeks -->
  <circle cx="30" cy="37" r="7" fill="#e8909a" opacity="0.38"/>
  <circle cx="66" cy="37" r="7" fill="#e8909a" opacity="0.38"/>
